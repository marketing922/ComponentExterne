<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <title>Ventes Flash Countdown</title>
    <style>
        html, body {
            margin: 0; padding: 0; background: #fff;
            width: 100%; font-family: 'Poppins', sans-serif;
        }

        /* --- Countdown Banner --- */
        .countdown-section { margin: 0; padding: 1rem; box-sizing: border-box; }

        .countdown-banner {
            background: #2E6B44; border-radius: 16px;
            padding: 1.4rem 1.25rem; display: flex; flex-direction: column; gap: 1.25rem;
            position: relative; overflow: hidden;
        }
        .countdown-banner::after {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(255,255,255,0.05); pointer-events: none;
        }
        .countdown-banner.is-live { background: #aacb55; }
        .countdown-banner.is-live .cb-status { background: #2E6B44; }

        /* Status badge */
        .cb-status {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.18); color: white;
            font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
            padding: 4px 11px; border-radius: 999px; width: fit-content;
        }
        .cb-status-dot {
            width: 6px; height: 6px; border-radius: 50%; background: white;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.65); }
        }

        /* Title */
        .cb-title {
            font-size: 17px; font-weight: 500; color: white;
            margin-top: 4px; line-height: 1.25;
        }
        .cb-title em {
            font-style: normal; font-size: 12px; font-weight: 300;
            opacity: 0.7; display: block; margin-top: 4px;
        }

        /* Timer */
        .cb-timer { display: flex; align-items: flex-start; gap: 8px; }
        .cb-unit { text-align: center; }
        .cb-val {
            display: block; font-size: 32px; font-weight: 600; line-height: 1;
            color: white; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
        }
        .cb-lbl {
            font-size: 9px; color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;
        }
        .cb-sep {
            font-size: 28px; font-weight: 200; color: rgba(255,255,255,0.25);
            line-height: 1; padding-top: 2px;
        }

        /* --- Responsive: Tablet >= 640px --- */
        @media (min-width: 640px) {
            .countdown-banner {
                flex-direction: row; align-items: center;
                justify-content: space-between; padding: 1.75rem 2rem;
            }
            .cb-val { font-size: 36px; }
        }

        /* --- Responsive: Desktop >= 1024px --- */
        @media (min-width: 1024px) {
            .countdown-banner { padding: 2.5rem 3rem; gap: 2rem; }
            .countdown-banner::after { width: 260px; height: 260px; top: -60px; right: -60px; }
            .cb-title { font-size: 22px; }
            .cb-title em { font-size: 13px; }
            .cb-val { font-size: 42px; }
            .cb-sep { font-size: 38px; }
            .cb-timer { gap: 10px; }
        }
    </style>
</head>

<body>

    <section class="countdown-section">
        <div id="countdown-banner" class="countdown-banner">
            <div class="cb-left">
                <div class="cb-status">
                    <span class="cb-status-dot"></span><span id="cb-status-text">Prochaine vente</span>
                </div>
                <div class="cb-title">
                    <span id="cb-title-text">...</span>
                    <em id="cb-subtitle-text"></em>
                </div>
            </div>
            <div class="cb-timer">
                <div class="cb-unit">
                    <span class="cb-val" id="days">00</span>
                    <div class="cb-lbl" id="label-days">Jours</div>
                </div>
                <div class="cb-sep">:</div>
                <div class="cb-unit">
                    <span class="cb-val" id="hours">00</span>
                    <div class="cb-lbl" id="label-hours">Heures</div>
                </div>
                <div class="cb-sep">:</div>
                <div class="cb-unit">
                    <span class="cb-val" id="minutes">00</span>
                    <div class="cb-lbl" id="label-minutes">Min</div>
                </div>
                <div class="cb-sep">:</div>
                <div class="cb-unit">
                    <span class="cb-val" id="seconds">00</span>
                    <div class="cb-lbl" id="label-seconds">Sec</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        (function () {
            // ================= Configuration =================
            const i18n = {
                "fr": {
                    activeTitle: "La vente flash a commencée", statusActive: "Vente en cours", statusUpcoming: "Prochaine vente",
                    labels: ["Jours", "Heures", "Min", "Sec"],
                    days: ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"],
                    months: ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."],
                    subtitleLive: "Se termine le {endDay} {endDate} {endMonth} à 10h · Stocks ultra-limités",
                    subtitleUpcoming: "Ouverture à 10h · se termine le {endDay} à 10h · Stocks ultra-limités"
                },
                "en": {
                    activeTitle: "Flash sale has started", statusActive: "Sale live", statusUpcoming: "Next sale",
                    labels: ["Days", "Hours", "Min", "Sec"],
                    days: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
                    months: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
                    subtitleLive: "Ends on {endDay} {endDate} {endMonth} at 10am · Ultra-limited stock",
                    subtitleUpcoming: "Opens at 10am · ends on {endDay} at 10am · Ultra-limited stock"
                },
                "zh-CN": {
                    activeTitle: "限时特卖进行中", statusActive: "特卖进行中", statusUpcoming: "下次特卖",
                    labels: ["天", "时", "分", "秒"],
                    days: ["周日","周一","周二","周三","周四","周五","周六"],
                    months: ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"],
                    subtitleLive: "{endDay} {endDate} {endMonth} 10点结束 · 库存极其有限",
                    subtitleUpcoming: "10点开始 · {endDay} 10点结束 · 库存极其有限"
                }
            };

            const params = new URLSearchParams(window.location.search);
            const langParam = params.get("language");
            const debugDateParam = params.get("debug-date");
            const bgParam = params.get("bg");
            if (bgParam) document.body.style.background = "#" + bgParam;
            const currentLang = (langParam && i18n[langParam]) ? langParam : "fr";
            const textData = i18n[currentLang];

            // --- 1. Parsing des Périodes Multiples ---
            // Format attendu URL: start_days=1,4 & end_days=2,5 (Lundi->Mardi ET Jeudi->Vendredi)
            let periods = [];

            const pStarts = params.get("start_days") ? params.get("start_days").split(',') : ["2"]; // Défaut: Mardi
            const pEnds = params.get("end_days") ? params.get("end_days").split(',') : ["3"];     // Défaut: Mercredi

            // Création de la liste des créneaux
            for (let i = 0; i < Math.min(pStarts.length, pEnds.length); i++) {
                const s = parseInt(pStarts[i].trim());
                const e = parseInt(pEnds[i].trim());
                if (!isNaN(s) && !isNaN(e)) {
                    // Conversion Input 1-7 vers JS 0-6 (Dimanche=0, Lundi=1 ... Samedi=6)
                    // Input 7 (Dimanche) devient 0
                    periods.push({
                        startDay: s % 7,
                        endDay: e % 7
                    });
                }
            }

            console.log("Périodes configurées :", periods);

            // ================= Cœur Logique =================

            // Convertit un jour/heure en "Heure de la semaine" (0 à 167) pour comparaison facile
            function getWeekHour(day, hour) {
                return day * 24 + hour;
            }

            function calculateTarget() {
                const now = debugDateParam ? new Date(debugDateParam) : new Date();
                // Force l'heure de Paris
                const parisTimeStr = now.toLocaleString("en-US", { timeZone: "Europe/Paris" });
                const parisDate = new Date(parisTimeStr);

                const currentDay = parisDate.getDay();
                const currentHour = parisDate.getHours();
                const currentWeekHour = getWeekHour(currentDay, currentHour); // Où sommes-nous dans la semaine (0-167)

                let activePeriod = null;
                let nextPeriodStart = null;
                let minDiffToNext = Infinity;

                // --- A. Vérifier si on est DANS une période (ACTIVE) ---
                for (let p of periods) {
                    const startWH = getWeekHour(p.startDay, 10); // Début à 10h
                    const endWH = getWeekHour(p.endDay, 10);     // Fin à 10h

                    let isActive = false;

                    if (startWH < endWH) {
                        // Semaine standard (ex: Mar -> Mer)
                        if (currentWeekHour >= startWH && currentWeekHour < endWH) isActive = true;
                    } else {
                        // Chevauchement dimanche (ex: Ven -> Lun)
                        // Actif si après le début OU avant la fin
                        if (currentWeekHour >= startWH || currentWeekHour < endWH) isActive = true;
                    }

                    if (isActive) {
                        activePeriod = p;
                        break; // On a trouvé, pas besoin de chercher plus loin
                    }
                }

                const targetDateObj = new Date(parisDate);
                targetDateObj.setMinutes(0);
                targetDateObj.setSeconds(0);
                targetDateObj.setMilliseconds(0);
                targetDateObj.setHours(10); // Cible toujours 10h

                if (activePeriod) {
                    // === CAS 1 : C'est EN COURS ===
                    // Objectif : La fin de cette période
                    let daysToAdd = (activePeriod.endDay - currentDay + 7) % 7;

                    // Correction si on est le jour de la fin mais avant 10h (daysToAdd sera 0, c'est correct)
                    // Correction si cross-week (ex: aujd vendredi, fin lundi. 1 - 5 = -4 => +7 = 3 jours. correct)

                    // Si le calcul tombe sur aujourd'hui mais qu'il est passé 10h (impossible car on serait 'upcoming'),
                    // ou si on chevauche la semaine, la logique modulo +7 gère la plupart des cas.
                    // Sécurité : Si on est le jour de fin et heure >= 10, ce n'est plus actif (déjà filtré avant).
                    // Si on est le jour de fin et heure < 10, daysToAdd = 0.

                    targetDateObj.setDate(parisDate.getDate() + daysToAdd);

                    return {
                        isFlashSaleActive: true,
                        targetTimestamp: getUtcTimestamp(targetDateObj),
                        activePeriod: activePeriod,
                        parisDate: parisDate
                    };

                } else {
                    // === CAS 2 : RIEN EN COURS (UPCOMING) ===
                    // Objectif : Le prochain début le plus proche

                    for (let p of periods) {
                        // Calculer combien de jours il faut attendre pour le startDay de cette période
                        let daysUntil = (p.startDay - currentDay + 7) % 7;

                        // Si c'est aujourd'hui mais qu'il est déjà passé 10h, c'est la semaine prochaine (+7)
                        if (daysUntil === 0 && currentHour >= 10) {
                            daysUntil = 7;
                        }

                        // On cherche le plus petit délai
                        if (daysUntil < minDiffToNext) {
                            minDiffToNext = daysUntil;
                            nextPeriodStart = p;
                        }
                    }

                    targetDateObj.setDate(parisDate.getDate() + minDiffToNext);

                    return {
                        isFlashSaleActive: false,
                        targetTimestamp: getUtcTimestamp(targetDateObj),
                        nextPeriod: nextPeriodStart,
                        targetDateObj: new Date(targetDateObj),
                        parisDate: parisDate
                    };
                }
            }

            // Helper pour récupérer le timestamp UTC correct depuis l'objet Date manipulé
            function getUtcTimestamp(localDateObj) {
                const year = localDateObj.getFullYear();
                const month = localDateObj.getMonth() + 1;
                const d = localDateObj.getDate();
                const h = localDateObj.getHours();
                // Reconstruit la chaîne ISO pour Paris afin d'obtenir le timestamp absolu
                const isoLocal = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}T${String(h).padStart(2, '0')}:00:00`;
                // Note: Si navigateur ancien, attention au support IANA timezones
                const parisStr = new Date(isoLocal).toLocaleString("en-US", { timeZone: "Europe/Paris" });
                return new Date(parisStr).getTime();
            }

            // ================= Mise à jour UI =================
            function updateUI() {
                const state = calculateTarget();
                const banner = document.getElementById("countdown-banner");

                // Status badge + is-live class
                document.getElementById("cb-status-text").textContent = state.isFlashSaleActive ? textData.statusActive : textData.statusUpcoming;
                if (state.isFlashSaleActive) {
                    banner.classList.add("is-live");
                } else {
                    banner.classList.remove("is-live");
                }

                // Titre + Sous-titre dynamiques
                var targetDate = new Date(state.targetTimestamp);
                if (state.isFlashSaleActive) {
                    document.getElementById("cb-title-text").textContent = textData.activeTitle;
                    document.getElementById("cb-subtitle-text").textContent = "";
                } else {
                    // Upcoming: title = "Mardi 14 avr.", subtitle = "Ouverture à 10h · se termine le mercredi à 10h..."
                    var startDayName = textData.days[targetDate.getDay()];
                    var startDateNum = targetDate.getDate();
                    var startMonthName = textData.months[targetDate.getMonth()];
                    document.getElementById("cb-title-text").textContent = startDayName + " " + startDateNum + " " + startMonthName;
                    // Compute end day name from the period
                    var endDayName = state.nextPeriod ? textData.days[state.nextPeriod.endDay].toLowerCase() : "";
                    document.getElementById("cb-subtitle-text").textContent = textData.subtitleUpcoming
                        .replace("{endDay}", endDayName);
                }

                // Labels
                document.getElementById("label-days").textContent = textData.labels[0];
                document.getElementById("label-hours").textContent = textData.labels[1];
                document.getElementById("label-minutes").textContent = textData.labels[2];
                document.getElementById("label-seconds").textContent = textData.labels[3];

                // Calcul Temps
                let now = debugDateParam ? new Date(debugDateParam).getTime() : Date.now();
                let distance = state.targetTimestamp - now;

                // Protection affichage négatif (si léger lag)
                if (distance < 0) distance = 0;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").textContent = String(days).padStart(2, "0");
                document.getElementById("hours").textContent = String(hours).padStart(2, "0");
                document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
                document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
            }

            updateUI();
            setInterval(updateUI, 1000);
        })();
    </script>



</body>

</html>
